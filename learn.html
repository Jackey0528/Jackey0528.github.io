<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>學習 — Jackey</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #FFFFFF; --bg-2: #F4F4F2; --bg-dark: #14171F;
  --ink: #1A1A1A; --ink-mid: #5C5C5C; --ink-light: #9A9A9A; --line: rgba(26,26,26,0.08);
}
html { scroll-behavior: smooth; }
body { background: var(--bg); color: var(--ink); font-family: 'DM Sans', 'Noto Sans TC', sans-serif; overflow-x: hidden; -webkit-font-smoothing: antialiased; }

/* NAV */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  padding: 0 3rem; height: 70px;
  display: flex; justify-content: space-between; align-items: center;
  background: rgba(255,255,255,0.9); backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--line);
}
.nav-logo { font-size: 1.2rem; font-weight: 900; color: var(--ink); text-decoration: none; }
.nav-right { display: flex; align-items: center; gap: 2.2rem; }
.nav-links { display: flex; align-items: center; gap: 2.2rem; list-style: none; }
.nav-links a { font-size: 0.92rem; font-weight: 500; color: var(--ink); text-decoration: none; transition: opacity 0.2s; }
.nav-links a:hover { opacity: 0.6; }
.nav-dropdown { position: relative; }
.nav-dropdown-menu {
  position: absolute; top: 140%; left: 50%; transform: translateX(-50%);
  background: var(--bg); border: 1px solid var(--line); border-radius: 10px;
  padding: 0.6rem; min-width: 130px;
  opacity: 0; visibility: hidden;
  transition: opacity 0.2s, visibility 0.2s;
  box-shadow: 0 12px 30px rgba(0,0,0,0.08);
}
.nav-dropdown:hover .nav-dropdown-menu { opacity: 1; visibility: visible; }
.nav-dropdown-menu a { display: block; padding: 0.5rem 0.7rem; border-radius: 6px; font-size: 0.85rem; font-weight: 400; color: var(--ink-mid); }
.nav-dropdown-menu a:hover { background: var(--bg-2); color: var(--ink); opacity: 1; }
.nav-cta { font-size: 0.85rem; font-weight: 700; color: #fff; background: var(--bg-dark); padding: 0.65rem 1.4rem; border-radius: 100px; text-decoration: none; transition: opacity 0.2s; }
.nav-cta:hover { opacity: 0.8; }
.lang-toggle { display: flex; align-items: center; gap: 0.3rem; }
.lang-btn { font-size: 0.8rem; background: none; border: none; cursor: pointer; color: var(--ink-light); transition: color 0.2s; padding: 0; }
.lang-btn.active { color: var(--ink); font-weight: 700; }
.lang-sep { font-size: 0.75rem; color: var(--line); }
.menu-toggle { display: none; flex-direction: column; gap: 5px; cursor: pointer; background: none; border: none; }
.menu-toggle span { width: 22px; height: 2px; background: var(--ink); display: block; }
.mobile-menu { position: fixed; top: 70px; left: 0; right: 0; z-index: 99; background: var(--bg); border-bottom: 1px solid var(--line); display: none; flex-direction: column; padding: 1rem 2rem 1.5rem; gap: 0.9rem; }
.mobile-menu.open { display: flex; }
.mobile-menu a { font-size: 0.95rem; font-weight: 500; color: var(--ink); text-decoration: none; }

/* PAGE HEADER */
.page-header { padding: 120px 3rem 3rem; max-width: 1200px; margin: 0 auto; border-bottom: 1px solid var(--line); }
.page-header-top { display: flex; justify-content: space-between; align-items: flex-end; }
.page-eyebrow { font-size: 0.78rem; color: var(--ink-light); letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 0.8rem; }
.page-title { font-size: clamp(2.5rem, 5vw, 4rem); font-weight: 900; letter-spacing: -0.02em; }
.page-count { font-size: 0.85rem; color: var(--ink-light); }

/* TAB */
.tab-bar { max-width: 1200px; margin: 0 auto; padding: 0 3rem; display: flex; gap: 0; border-bottom: 1px solid var(--line); }
.tab-link { font-size: 0.9rem; font-weight: 500; color: var(--ink-light); text-decoration: none; padding: 1rem 1.5rem; border-bottom: 2px solid transparent; transition: color 0.2s; margin-bottom: -1px; }
.tab-link:hover { color: var(--ink); }
.tab-link.active { color: var(--ink); border-bottom-color: var(--ink); }

/* CARD GRID */
.card-grid { max-width: 1200px; margin: 3rem auto; padding: 0 3rem; display: grid; grid-template-columns: repeat(3, 1fr); gap: 2rem; }
.article-card { text-decoration: none; color: var(--ink); display: block; background: var(--bg); border-radius: 18px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.06); transition: transform 0.3s, box-shadow 0.3s; }
.article-card:hover { transform: translateY(-4px); box-shadow: 0 16px 40px rgba(0,0,0,0.1); }
.article-thumb { aspect-ratio: 16/9; overflow: hidden; background: var(--bg-2); position: relative; }
.article-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.4s; }
.article-card:hover .article-thumb img { transform: scale(1.04); }
.article-badge { position: absolute; top: 0.9rem; left: 0.9rem; background: rgba(20,23,31,0.7); color: #fff; font-size: 0.7rem; font-weight: 500; padding: 0.35rem 0.8rem; border-radius: 100px; backdrop-filter: blur(6px); }
.article-content { padding: 1.2rem; }
.article-title { font-size: 0.98rem; font-weight: 700; line-height: 1.5; margin-bottom: 0.7rem; }
.article-meta { display: flex; justify-content: space-between; align-items: center; }
.article-date { font-size: 0.8rem; color: var(--ink-light); }
.article-arrow { font-size: 0.9rem; color: var(--ink-mid); transition: transform 0.2s; }
.article-card:hover .article-arrow { transform: translateX(4px); }

/* FOOTER */
footer { padding: 1.5rem 3rem; border-top: 1px solid var(--line); display: flex; justify-content: space-between; align-items: center; margin-top: 4rem; }
footer p { font-size: 0.72rem; color: var(--ink-light); }
.footer-links { display: flex; gap: 1.5rem; }
.footer-links a { font-size: 0.72rem; color: var(--ink-light); text-decoration: none; transition: color 0.2s; }
.footer-links a:hover { color: var(--ink); }

/* REVEAL */
.reveal { opacity: 0; transform: translateY(20px); transition: opacity 0.7s cubic-bezier(0.23,1,0.32,1), transform 0.7s cubic-bezier(0.23,1,0.32,1); }
.reveal.visible { opacity: 1; transform: translateY(0); }

/* RWD */
@media (max-width: 900px) {
  nav { padding: 0 1.5rem; }
  .nav-links { display: none; }
  .menu-toggle { display: flex; }
  .page-header, .tab-bar, .card-grid { padding-left: 1.5rem; padding-right: 1.5rem; }
  .card-grid { grid-template-columns: repeat(2, 1fr); }
  footer { padding: 1.5rem; flex-direction: column; gap: 1rem; }
}
@media (max-width: 580px) {
  .card-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">Jackey.</a>
  <div class="nav-right">
    <ul class="nav-links">
      <li><a href="index.html" data-zh="首頁" data-en="Home">首頁</a></li>
      <li class="nav-dropdown">
        <a href="#" data-zh="文章 ▾" data-en="Articles ▾">文章 ▾</a>
        <div class="nav-dropdown-menu">
          <a href="learn.html" data-zh="學習" data-en="Learn">學習</a>
          <a href="journal.html" data-zh="日誌" data-en="Journal">日誌</a>
        </div>
      </li>
      <li><a href="portfolio.html" data-zh="作品集" data-en="Portfolio">作品集</a></li>
      <li><a href="about.html" data-zh="關於我" data-en="About">關於我</a></li>
    </ul>
    <div class="lang-toggle">
      <button class="lang-btn" data-lang="zh">中</button>
      <span class="lang-sep">/</span>
      <button class="lang-btn" data-lang="en">EN</button>
    </div>
    <button class="menu-toggle" id="menuToggle"><span></span><span></span><span></span></button>
  </div>
</nav>

<div class="mobile-menu" id="mobileMenu">
  <a href="index.html" data-zh="首頁" data-en="Home">首頁</a>
  <a href="learn.html" data-zh="學習" data-en="Learn">學習</a>
  <a href="journal.html" data-zh="日誌" data-en="Journal">日誌</a>
  <a href="portfolio.html" data-zh="作品集" data-en="Portfolio">作品集</a>
  <a href="about.html" data-zh="關於我" data-en="About">關於我</a>
</div>

<!-- Header -->
<div class="page-header reveal">
  <p class="page-eyebrow" data-zh="文章" data-en="Articles">文章</p>
  <div class="page-header-top">
    <h1 class="page-title" data-zh="學習" data-en="Learn">學習</h1>
    <p class="page-count">0 <span data-zh="篇文章" data-en="articles">篇文章</span></p>
  </div>
</div>

<!-- Tab -->
<div class="tab-bar">
  <a href="learn.html" class="tab-link active" data-zh="學習" data-en="Learn">學習</a>
  <a href="journal.html" class="tab-link" data-zh="日誌" data-en="Journal">日誌</a>
</div>

<!-- Cards -->
<div class="card-grid">
</div>

<footer>
  <p>© 2025 Jackey. All rights reserved.</p>
  <div class="footer-links">
    <a href="#">Instagram</a>
    <a href="#">GitHub</a>
    <a href="#">Email</a>
  </div>
</footer>

<script>
const obs = new IntersectionObserver(entries => {
  entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); obs.unobserve(e.target); } });
}, { threshold: 0.06 });
document.querySelectorAll('.reveal').forEach(el => obs.observe(el));

document.getElementById('menuToggle').addEventListener('click', () => document.getElementById('mobileMenu').classList.toggle('open'));

function setLang(lang, save = true) {
  document.querySelectorAll('[data-zh]').forEach(el => {
    el.innerHTML = lang === 'zh' ? el.getAttribute('data-zh') : el.getAttribute('data-en');
  });
  document.documentElement.lang = lang === 'zh' ? 'zh-TW' : 'en';
  document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.toggle('active', btn.getAttribute('data-lang') === lang));
  if (save) localStorage.setItem('jmd-lang', lang);
}
document.querySelectorAll('.lang-btn').forEach(btn => btn.addEventListener('click', () => setLang(btn.getAttribute('data-lang'))));
setLang(localStorage.getItem('jmd-lang') || 'zh', false);
</script>
</body>
</html>
